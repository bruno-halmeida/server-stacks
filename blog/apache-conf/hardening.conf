# Hardening adicional do Apache dentro do container WordPress.
# Montado em /etc/apache2/conf-enabled/ para ser carregado pelo apache2.

# Bloqueia execução de qualquer script dentro de /wp-content/uploads/
# (defesa contra webshells via upload comprometido)
<Directory /var/www/html/wp-content/uploads>
    <FilesMatch "\.(?:php[0-9]*|phtml|phar|pl|py|cgi|sh|asp|aspx|jsp)$">
        Require all denied
    </FilesMatch>
    # Desliga qualquer handler/type que possa executar PHP neste tree
    php_flag engine off
    RemoveHandler .php .phtml .phar .php3 .php4 .php5 .php7 .php8
    RemoveType .php .phtml .phar
    Options -ExecCGI
</Directory>

# Mesma regra para wp-content em geral (cobre cache, plugin uploads, etc. exceto PHP legítimo)
# — aqui não dá pra desligar engine porque plugins/temas precisam rodar PHP.
# Mas bloqueamos diretórios comuns onde não deveria haver PHP.
<DirectoryMatch "^/var/www/html/wp-content/(uploads|cache|backups?)/">
    <FilesMatch "\.(?:php[0-9]*|phtml|phar)$">
        Require all denied
    </FilesMatch>
</DirectoryMatch>

# Bloqueia arquivos sensíveis que não deveriam ser servidos
<FilesMatch "^(\.ht|\.user\.ini|wp-config\.php|wp-config-sample\.php)">
    Require all denied
</FilesMatch>
<FilesMatch "\.(bak|old|orig|save|swp|sql|sql\.gz|tar|tar\.gz|zip|log)$">
    Require all denied
</FilesMatch>

# Desliga assinatura/tokens do Apache (já mascarado pelo Traefik, defesa em profundidade)
ServerTokens Prod
ServerSignature Off

# Desabilita métodos HTTP perigosos (TRACE é o clássico)
TraceEnable off

# Desabilita listagem de diretórios globalmente
<Directory /var/www/html>
    Options -Indexes
</Directory>
